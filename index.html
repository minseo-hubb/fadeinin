<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <style>
        body {
            margin: 0;
        }
        .visual {
            background-image: url(./images/visual_bg.jpg);
        }
        .inner {
            height: 1000px;
            width: 1100px;
            margin: 0 auto;
            background-color: #F9F6E5;
            position: relative;
        }
        .visual .title {
            position:absolute;
            top: 88px;
            left: 150px;
        }
        .visual .title img {
        width: 400px; 
        height: auto;  
}
        .visual .pcup1 {
            position: absolute;
            bottom: 0;
            right: -47px;
        }

        .visual .cup1.text {
            position: absolute;
            top: -30px;
            right: 220px;
        }
        .visual .pcup2 {
            position: absolute;
            bottom: 0;
            right: 300px;
        }
        .visual .cup2.text {
            position: absolute;
            top: 150px;
            right: 250px;
        }
        .visual .pcup2 img {
        width: 300px; 
        height: auto;  
}
        .visual .pspoon {
            position: absolute;
            bottom: 0;
            left: -150px;
        }
    </style>
</head>
<body>
    <section class="visual">
        <div class="inner">
            <div class="title fade-in">
                <img src="./로고.png" alt="">
            </div>

            <div class="pcup1 fade-in">
                <img src="./리플케이스.png" alt="" class="cup1 image">
            </div>

            <div class="pcup2 fade-in">
                <img src="./에어팟.png" alt="" class="cup2 image">
            </div>

            <div class="pspoon fade-in">
                <img src="./참.png" alt="">
            </div>
        </div>
    </section>
    <script>
        const fadeEls = document.querySelectorAll('.visual .fade-in');
        gsap.from(fadeEls, {
            duration: 2,
            scale: .3,
            ease: "none",
            opacity: 0,
            stagger: 0.7
        })
    </script>
</body>
</html>
